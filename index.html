<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PDF Flipbook</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@latest/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@latest/dflip/css/themify-icons.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="controls">
            <select id="book-selector">
                <option value="">Select a book...</option>
            </select>
            <button id="toggle-toolbar-btn">T</button>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="flipbook"></div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        var DFLIP = DFLIP || {};
        DFLIP.defaults = {
            basePath: "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@latest/dflip/"
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@latest/dflip/js/dflip.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
